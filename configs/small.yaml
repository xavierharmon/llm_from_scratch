# Small config — trains on a laptop CPU in ~2 hours
# Run with: python 06_training/train.py --config configs/small.yaml

vocab_size: 8000
d_model: 128
num_heads: 4
num_layers: 4
d_ff: 512
max_seq_len: 256
dropout: 0.1
activation: gelu
bias: false

batch_size: 32
learning_rate: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
warmup_steps: 200
max_steps: 5000
val_interval: 250
log_interval: 50
grad_accumulation_steps: 1

tokenizer_path: 02_tokenization/tokenizer.json
corpus_path: 01_data/processed/corpus.txt
experiment_dir: experiments/baseline
