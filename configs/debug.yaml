# Debug config — trains in seconds, good for testing code changes
# Run with: python step_06_training/train.py --config configs/debug.yaml

vocab_size: 512
d_model: 32
num_heads: 2
num_layers: 2
d_ff: 64
max_seq_len: 64
dropout: 0.0
activation: gelu
bias: false

batch_size: 8
learning_rate: 1.0e-3
weight_decay: 0.1
grad_clip: 1.0
warmup_steps: 10
max_steps: 100
val_interval: 50
log_interval: 10
grad_accumulation_steps: 1

tokenizer_path: step_02_tokenization/tokenizer.json
corpus_path: step_01_data/processed/corpus.txt
experiment_dir: experiments/debug
